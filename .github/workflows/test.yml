# See: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions

name: 'Test'

on:
  workflow_dispatch:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js version
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'

      - name: Test
        run: 'npm run all'
